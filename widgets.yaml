---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/info-widgets/

- resources:
    cpu: true
    memory: true
    disk: /

- search:
    provider: brave
    target: _blank

- datetime:
    text_size: md
    format:
      timeStyle: short
      dateStyle: short
    locale: 'de-AT'

- openmeteo:
    label: Home
    latitude: 48.1299
    longitude: 15.1354
    units: metric
    cache: 5
